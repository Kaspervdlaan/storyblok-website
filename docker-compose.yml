services:
  vibe-design:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_STORYBLOK_API_TOKEN: ${VITE_STORYBLOK_API_TOKEN}
    container_name: vibe-design
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vibe-network

networks:
  vibe-network:
    external: true
    name: vibe-network
