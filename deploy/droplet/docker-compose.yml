services:
  laravel-proxy:
    build:
      context: ../../../laravel-proxy
      dockerfile: Dockerfile
    container_name: laravel-proxy
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      CACHE_STORE: file
      STORYBLOK_API_TOKEN: ${STORYBLOK_API_TOKEN}
      STORYBLOK_CV_SLUG: ${STORYBLOK_CV_SLUG:-cv}
      STORYBLOK_VERSION: ${STORYBLOK_VERSION:-published}
      CV_CACHE_TTL_SECONDS: ${CV_CACHE_TTL_SECONDS:-900}
      CV_CACHE_BUST_TOKEN: ${CV_CACHE_BUST_TOKEN:-}
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@file_get_contents('http://127.0.0.1:8000/api/health'));" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  vibe-design:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VITE_STORYBLOK_API_TOKEN: ${VITE_STORYBLOK_API_TOKEN}
    container_name: vibe-design
    restart: unless-stopped
    depends_on:
      laravel-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "80:80"
